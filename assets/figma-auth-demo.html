<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authentication Interface - Figma Design</title>
    <link rel="stylesheet" href="../figma-auth.css">
    <style>
        body {
            margin: 0;
            padding: 0;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <!-- Left Panel (Branding) -->
        <div class="auth-panel-left">
            <h1>Welcome</h1>
            <p>Join our community and start your journey with secure authentication.</p>
        </div>

        <!-- Right Panel (Form) -->
        <div class="auth-panel-right">
            <form class="auth-form">
                <h2>Sign In</h2>

                <div class="form-group">
                    <label for="email" class="form-label">Email Address</label>
                    <input type="email" id="email" class="form-input" placeholder="your@email.com" required>
                </div>

                <div class="form-group">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" id="password" class="form-input" placeholder="Enter your password" required>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Sign In</button>
                    <button type="button" class="btn btn-secondary">Create Account</button>
                </div>

                <div class="divider">
                    <span>or</span>
                </div>

                <div class="social-buttons">
                    <button type="button" class="btn btn-social">Google</button>
                    <button type="button" class="btn btn-social">GitHub</button>
                </div>

                <div class="form-link">
                    <a href="#">Forgot password?</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
